syntax = "proto3";

package magicbox.waiting.v1;

option java_package = "kr.magicbox.waiting.grpc.waiting";
option java_outer_classname = "WaitingServiceProto";
option java_multiple_files = true;

service WaitingService {
  rpc ValidatePurchaseToken(ValidatePurchaseTokenRequest) returns (ValidatePurchaseTokenResponse);
}

message ValidatePurchaseTokenRequest {
  int64 release_id = 1;
  int64 user_id = 2;
  string purchase_token = 3;
}

message ValidatePurchaseTokenResponse {
  bool valid = 1;
}
