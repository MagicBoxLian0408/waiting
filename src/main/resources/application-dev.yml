waiting:
  avg-purchase-seconds: ${WAITING_AVG_PURCHASE_SECONDS:30}
  purchase-token-ttl-seconds: ${WAITING_PURCHASE_TOKEN_TTL_SECONDS:300}
  polling-interval-seconds: ${WAITING_POLLING_INTERVAL_SECONDS:10}
  queue-key-prefix: ${WAITING_QUEUE_KEY_PREFIX:waiting:}
  user-release-key-prefix: ${WAITING_USER_RELEASE_KEY_PREFIX:user_release:}
  token-key-prefix: ${WAITING_TOKEN_KEY_PREFIX:purchase_token:}
  admission-decrease-ratio: ${WAITING_ADMISSION_DECREASE_RATIO:0.9}
  admission-max-batch-ratio: ${WAITING_ADMISSION_MAX_BATCH_RATIO:0.2}
  admission-initial-batch-ratio-percent: ${WAITING_ADMISSION_INITIAL_BATCH_RATIO_PERCENT:10}

spring:
  application:
    name: waiting-dev
  jackson:
    property-naming-strategy: SNAKE_CASE
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  grpc:
    server:
      port: ${GRPC_SERVER_PORT}
    client:
      channels:
        release-service:
          address: ${RELEASE_SERVICE_URL}
          negotiation-type: plaintext
          keep-alive-time: 30s
          keep-alive-timeout: 5s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: purchase-token-issued:kr.magicbox.waiting.adapter.out.kafka.event.PurchaseTokenIssuedKafkaEvent
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

resilience4j:
  circuitbreaker:
    instances:
      releaseService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  timelimiter:
    instances:
      releaseService:
        timeout-duration: 2s
