spring:
  application:
    name: waiting-local
  jackson:
    property-naming-strategy: SNAKE_CASE
  config:
    import:
      - file:services/waiting/env/local.env[.properties]
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: purchase-token-issued:kr.magicbox.waiting.adapter.out.kafka.event.PurchaseTokenIssuedKafkaEvent
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  r2dbc:
    url: r2dbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  grpc:
    server:
      port: ${GRPC_SERVER_PORT}
    client:
      channels:
        release-service:
          address: ${RELEASE_SERVICE_URL}
          negotiation-type: plaintext
          keep-alive-time: 30s
          keep-alive-timeout: 5s

server:
  port: ${SERVER_PORT}


resilience4j:
  circuitbreaker:
    instances:
      releaseService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
  timelimiter:
    instances:
      releaseService:
        timeout-duration: 2s
